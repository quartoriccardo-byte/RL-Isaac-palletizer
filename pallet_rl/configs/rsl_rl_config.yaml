# RSL-RL Configuration for Palletizer
# Isaac Lab 4.0+ Compatible
# Curriculum-aware: defaults set for Stage A (place-only)

seed: 42

# Curriculum stage (A, B, C, D)
# Stage A: place-only, coarse grid, easy task
# Stage D: full factored actions with buffer ops
curriculum_stage: A

runner:
  # Runner class to use
  class_name: OnPolicyRunner
  
  # Policy and algorithm class names
  policy_class_name: ActorCritic
  algorithm_class_name: PPO
  
  # Rollout settings (stage-dependent, overridden by curriculum)
  num_steps_per_env: 48
  
  # Training settings
  max_iterations: 2000
  save_interval: 10
  
  # Experiment tracking
  experiment_name: palletizer_ppo
  run_name: isaac_lab_v4
  
  # Resume settings
  resume: false
  load_run: -1
  checkpoint: -1
  
  # Observation groups mapping (required by RSL-RL OnPolicyRunner)
  obs_groups:
    policy: ["policy"]
    critic: ["critic"]

policy:
  # Custom policy class will be injected via monkey-patch
  # PlaceOnlyActorCritic for stages A-C, PalletizerActorCritic for D
  
  init_noise_std: 1.0
  
  # Actor network (hidden dims only - first layer is vision encoder)
  actor_hidden_dims: [256, 128]
  
  # Critic network
  critic_hidden_dims: [256, 128]
  
  # Activation function
  activation: elu
  
  # Vision encoder config (used by both policy variants)
  # Input: (N, 1, 160, 240) heightmap
  # Output: 256-dim latent
  vision:
    type: cnn
    channels: [16, 32, 64]
    kernel_sizes: [5, 3, 3]
    strides: [2, 2, 2]
    output_dim: 256
  
  # Vector encoder config (buffer state)
  # Input: 91 (buffer 60 + box dims 3 + payload/mass/constraints 4 + proprio 24)
  # Output: 64-dim latent
  vector:
    type: mlp
    hidden_dims: [128, 64]
    activation: elu

algorithm:
  # PPO hyperparameters
  
  # Value loss coefficient
  value_loss_coef: 1.0
  use_clipped_value_loss: true
  
  # Policy clipping
  clip_param: 0.2
  
  # Entropy bonus (stage-dependent, higher for early stages)
  entropy_coef: 0.02
  
  # Training epochs per rollout
  num_learning_epochs: 5
  num_mini_batches: 4
  
  # Optimization
  learning_rate: 3.0e-4
  schedule: adaptive
  
  # GAE parameters
  gamma: 0.99
  lam: 0.95
  
  # KL divergence target
  desired_kl: 0.01
  
  # Gradient clipping
  max_grad_norm: 1.0

# Environment-specific (for reference)
env:
  num_envs: 4096
  
  # Observation structure (unchanged across stages)
  obs_dim: 38491
  # - Heightmap: 160 * 240 = 38400
  # - Buffer: 10 * 6 = 60 (zero-padded in place-only stages)
  # - Box dims: 3
  # - Payload norm: 1
  # - Mass norm: 1
  # - Max payload norm: 1
  # - Max stack height norm: 1
  # - Proprio: 24
  
  # Action space (stage-dependent):
  # Stage A: Discrete(192) = 8*12*2 joint placement
  # Stage B: Discrete(432) = 12*18*2
  # Stage C: Discrete(768) = 16*24*2
  # Stage D: Factored [3, 10, 16, 24, 2] = 55 logits
